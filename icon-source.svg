<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fond bordeaux -->
  <rect width="512" height="512" rx="100" ry="100" fill="#7A1520"/>

  <!-- Rideau gauche -->
  <path d="M0,0 L88,0 C 62,90 80,200 68,310 C 55,400 62,460 0,512 Z" fill="#9B1B2B"/>
  <!-- Rideau droit -->
  <path d="M512,0 L424,0 C 450,90 432,200 444,310 C 457,400 450,460 512,512 Z" fill="#9B1B2B"/>
  <!-- Galons rideaux -->
  <rect x="84"  y="0" width="10" height="512" fill="#C0392B" opacity="0.55"/>
  <rect x="418" y="0" width="10" height="512" fill="#C0392B" opacity="0.55"/>

  <!-- ══ Masque TRAGÉDIE (beige, derrière, légèrement à droite) ══ -->
  <g transform="translate(295,268)">
    <!-- Visage -->
    <ellipse cx="0" cy="0" rx="88" ry="108" fill="#C8B09A"/>
    <!-- Yeux -->
    <ellipse cx="-22" cy="-24" rx="14" ry="18" fill="#4A1010"/>
    <ellipse cx=" 22" cy="-24" rx="14" ry="18" fill="#4A1010"/>
    <!-- Bouche triste : arc cubique -->
    <path d="M -37,34 C -22,16 22,16 37,34"
          stroke="#4A1010" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Larme -->
    <ellipse cx="-20" cy="8" rx="5" ry="8" fill="#8899CC" opacity="0.65"/>
  </g>

  <!-- ══ Masque COMÉDIE (crème, devant, centré gauche) ══ -->
  <g transform="translate(210,248)">
    <!-- Visage -->
    <ellipse cx="0" cy="0" rx="104" ry="126" fill="#F5E8D5"/>
    <!-- Yeux -->
    <ellipse cx="-28" cy="-28" rx="18" ry="23" fill="#3D0F0F"/>
    <ellipse cx=" 28" cy="-28" rx="18" ry="23" fill="#3D0F0F"/>
    <!-- Bouche souriante : arc cubique -->
    <path d="M -47,26 C -28,72 28,72 47,26"
          stroke="#3D0F0F" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Joues rosées -->
    <ellipse cx="-56" cy="12" rx="20" ry="11" fill="#C0392B" opacity="0.18"/>
    <ellipse cx=" 56" cy="12" rx="20" ry="11" fill="#C0392B" opacity="0.18"/>
  </g>

</svg>
